AWSTemplateFormatVersion: "2010-09-09"
Description: Cafe application template
Parameters:
  InstanceTypeParameter:
    Type: String
    Default: t2.small
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
    Description: Choose the EC2 instance type for the web server
Resources:
  CafeInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeParameter
      ImageId: ami-0abcdef1234567890  # Remplace par ton AMI
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !ImportValue cafe-network-PublicSubnet
      KeyName: my-key  # Remplace par ta key pair
      IamInstanceProfile: myInstanceProfile  # Remplace par ton profil IAM
      Tags:
        - Key: Name
          Value: CafeAppInstance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
